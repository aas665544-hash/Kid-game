<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="遊戲屋">
<meta name="theme-color" content="#8fd3ff">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>歡樂遊戲屋</title>
<style>
:root{
  --sky1:#8fd3ff; --sky2:#c3e9ff; --cream:#fff7ec;
  --ink:#3a2f4a; --soft:#6b5e7d;
  --c1:#ff9f43; --c2:#3fc66b; --c3:#ff7eb3; --c4:#ff5e57; --c5:#4d9bff;
  --c6:#9b6dff; --c7:#16c2c2; --c8:#ff6fa5; --c9:#d56bff; --c10:#2dd4d4;
  --shadow:0 10px 0 rgba(0,0,0,.12), 0 16px 26px rgba(0,0,0,.18);
  --round:28px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;margin:0;}
body{
  font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,-apple-system,"Segoe UI",sans-serif;
  color:var(--ink);
  background:linear-gradient(180deg,var(--sky1),var(--sky2) 55%,#eafaff);
  overflow:hidden; user-select:none; -webkit-user-select:none;
  touch-action:manipulation; overscroll-behavior:none;
}
#app{position:fixed; inset:0; display:flex; flex-direction:column;}
.screen{position:absolute; inset:0; display:none; flex-direction:column;}
.screen.active{display:flex;}

/* clouds */
.clouds{position:absolute; inset:0; overflow:hidden; pointer-events:none; z-index:0;}
.cloud{position:absolute; font-size:64px; opacity:.85; animation:float 24s linear infinite;}
@keyframes float{from{transform:translateX(-20vw)}to{transform:translateX(120vw)}}

/* HOME */
#home{padding:max(16px,env(safe-area-inset-top)) 18px 18px; z-index:1;}
.home-title{
  text-align:center; font-weight:900; font-size:clamp(28px,5vw,46px);
  color:#fff; text-shadow:0 3px 0 #ffb43f,0 6px 0 #e98a00,0 10px 16px rgba(0,0,0,.2);
  margin:6px 0 4px; letter-spacing:2px;
}
.home-sub{text-align:center; color:#2a6fb0; font-weight:800; margin:0 0 12px; font-size:clamp(13px,2.4vw,18px);}
.grid{
  flex:1; display:grid; gap:clamp(10px,1.8vw,18px);
  grid-template-columns:repeat(5,1fr); grid-auto-rows:minmax(96px,1fr);
  max-width:1100px; width:100%; margin:0 auto; align-content:center;
  overflow-y:auto; -webkit-overflow-scrolling:touch; padding:4px;
}
@media (max-width:820px){.grid{grid-template-columns:repeat(2,1fr);} }
@media (max-width:820px) and (orientation:landscape){.grid{grid-template-columns:repeat(5,1fr);} }
.card{
  border:none; cursor:pointer; border-radius:var(--round); color:#fff;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:6px; padding:10px; min-height:120px; position:relative;
  box-shadow:var(--shadow); transition:transform .12s ease; font-family:inherit;
  animation:pop .4s backwards;
}
.card:active{transform:translateY(6px) scale(.98); box-shadow:0 4px 0 rgba(0,0,0,.12),0 8px 14px rgba(0,0,0,.18);}
.card .emoji{font-size:clamp(38px,6vw,58px); line-height:1; filter:drop-shadow(0 4px 4px rgba(0,0,0,.2));}
.card .name{font-weight:900; font-size:clamp(15px,2.4vw,21px); text-shadow:0 2px 3px rgba(0,0,0,.25);}
@keyframes pop{from{transform:scale(.4); opacity:0}to{transform:scale(1);opacity:1}}

/* GAME SHELL */
#game{z-index:2; background:linear-gradient(180deg,#fff7ec,#ffeede);}
.topbar{
  display:flex; align-items:center; gap:10px; padding:max(10px,env(safe-area-inset-top)) 14px 10px;
}
.tbtn{
  border:none; font-family:inherit; cursor:pointer; border-radius:18px; color:#fff;
  font-weight:900; font-size:20px; padding:10px 16px; box-shadow:0 5px 0 rgba(0,0,0,.18);
  display:flex; align-items:center; gap:6px;
}
.tbtn:active{transform:translateY(4px); box-shadow:0 1px 0 rgba(0,0,0,.18);}
.tbtn.home{background:#ff7a59;}
.tbtn.mute{background:#5aa9ff; margin-left:auto;}
.gtitle{font-weight:900; font-size:clamp(18px,3vw,26px); color:var(--ink);}
.scorepill{margin-left:8px; background:#ffd54a; color:#6b4b00; font-weight:900; padding:8px 14px; border-radius:16px; box-shadow:0 4px 0 #e0a900; font-size:18px;}
#gameStage{flex:1; position:relative; overflow:hidden; padding:8px clamp(8px,2vw,20px) clamp(12px,2vw,20px);}
.stage-card{
  position:absolute; inset:8px clamp(8px,2vw,20px) clamp(12px,2vw,20px);
  background:#fff; border-radius:26px; box-shadow:inset 0 0 0 5px rgba(0,0,0,.04),0 14px 30px rgba(0,0,0,.1);
  overflow:hidden; display:flex; flex-direction:column;
}

/* generic helpers */
.center{display:flex; align-items:center; justify-content:center;}
.col{display:flex; flex-direction:column;}
.fill{flex:1;}
.hint{position:absolute; top:10px; left:0; right:0; text-align:center; font-weight:900; color:var(--soft); font-size:clamp(16px,2.6vw,22px); pointer-events:none;}
.bigbtn{
  border:none; font-family:inherit; cursor:pointer; font-weight:900; color:#fff;
  background:#3fc66b; border-radius:20px; padding:14px 26px; font-size:22px;
  box-shadow:0 6px 0 #2ba14f; 
}
.bigbtn:active{transform:translateY(5px); box-shadow:0 1px 0 #2ba14f;}

/* overlay celebrate */
.overlay{
  position:absolute; inset:0; background:rgba(40,20,60,.45); backdrop-filter:blur(2px);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; z-index:30;
  animation:fade .25s;
}
@keyframes fade{from{opacity:0}to{opacity:1}}
.overlay .msg{font-size:clamp(30px,6vw,52px); font-weight:900; color:#fff; text-shadow:0 4px 0 #ff9f43,0 8px 14px rgba(0,0,0,.3); text-align:center;}
.overlay .star{font-size:90px; animation:spin 1.2s ease infinite alternate;}
@keyframes spin{from{transform:rotate(-12deg) scale(1)}to{transform:rotate(12deg) scale(1.15)}}

/* confetti */
.confetti{position:absolute; top:-20px; width:12px; height:18px; border-radius:3px; z-index:40; animation:drop 1.5s ease-in forwards;}
@keyframes drop{to{transform:translate(var(--x,0),120vh) rotate(540deg); opacity:.2}}

.tap-pop{animation:tappop .3s;}
@keyframes tappop{0%{transform:scale(1)}50%{transform:scale(1.25)}100%{transform:scale(1)}}
.shake{animation:shake .35s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
button{font-family:inherit;}
svg{display:block;}
.row-wrap{display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:center;}

/* home top row with stars + music */
.home-top{display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:8px; flex-wrap:wrap;}
.starcount{background:#fff; color:#e08a00; font-weight:900; padding:6px 16px; border-radius:18px; box-shadow:0 4px 0 rgba(0,0,0,.12); font-size:clamp(15px,2.6vw,20px); display:flex; align-items:center; gap:4px;}
.musicbtn{border:none; cursor:pointer; background:#fff; color:#7c4dff; font-weight:900; padding:6px 14px; border-radius:18px; box-shadow:0 4px 0 rgba(0,0,0,.12); font-size:clamp(14px,2.4vw,18px); font-family:inherit;}
.musicbtn:active{transform:translateY(3px); box-shadow:none;}
/* bob animation on cards */
.card{animation:pop .4s backwards, bob 3s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.card .emoji{position:relative;}
.card .badge{position:absolute; top:6px; right:8px; font-size:20px; filter:none; text-shadow:0 1px 2px rgba(0,0,0,.3);}
/* reward shelf */
.shelf{max-width:1100px; width:100%; margin:8px auto 0; background:rgba(255,255,255,.55); border-radius:22px; padding:8px 10px; display:flex; gap:6px; justify-content:center; flex-wrap:wrap; box-shadow:inset 0 2px 6px rgba(0,0,0,.06);}
.shelf .slot{width:clamp(34px,7vw,46px); height:clamp(34px,7vw,46px); border-radius:14px; background:rgba(255,255,255,.6); display:flex; align-items:center; justify-content:center; font-size:clamp(20px,4.5vw,28px); filter:grayscale(1) opacity(.35); transition:filter .3s, transform .3s;}
.shelf .slot.earned{filter:none; transform:scale(1.05); background:#fff; box-shadow:0 3px 0 rgba(0,0,0,.1);}
.plus-one{position:absolute; font-size:40px; font-weight:900; color:#ffd54a; text-shadow:0 3px 0 #e0a900; z-index:50; animation:plusUp 1s ease forwards; pointer-events:none;}
@keyframes plusUp{0%{transform:translateY(0) scale(.5); opacity:0}30%{opacity:1}100%{transform:translateY(-80px) scale(1.3); opacity:0}}
@media (prefers-reduced-motion: reduce){.card{animation:pop .4s backwards;} .cloud{animation:none;}}

/* settings sheet */
.sheet{background:#fff; border-radius:26px; padding:22px; width:min(360px,86vw); box-shadow:0 18px 50px rgba(0,0,0,.3); display:flex; flex-direction:column; gap:12px;}
.sheet h3{margin:0 0 4px; text-align:center; color:#5a3a7a; font-size:24px;}
.srow{display:flex; align-items:center; justify-content:space-between; gap:10px; background:#f4eefc; border-radius:16px; padding:12px 16px; font-weight:900; color:#5a3a7a; font-size:18px;}
.sbtn{border:none; cursor:pointer; font-family:inherit; font-weight:900; border-radius:14px; padding:8px 16px; font-size:16px; color:#fff; box-shadow:0 4px 0 rgba(0,0,0,.18);}
.sbtn:active{transform:translateY(3px); box-shadow:none;}
.sbtn.on{background:#3fc66b;} .sbtn.off{background:#aab;} .sbtn.blue{background:#4d9bff;} .sbtn.red{background:#ff6b5e;} .sbtn.grey{background:#9aa7b5;}
/* lock ring on home button */
.tbtn.home{position:relative; overflow:hidden;}
.lockring{position:absolute; left:0; bottom:0; height:6px; width:0; background:#ffd54a; pointer-events:none;}
/* trophy */
.trophy{font-size:120px; animation:spin 1.2s ease infinite alternate; filter:drop-shadow(0 8px 10px rgba(0,0,0,.3));}
/* toast */
#toast{position:fixed; left:50%; bottom:14%; transform:translateX(-50%) translateY(20px); background:rgba(40,20,60,.92); color:#fff; font-weight:900; padding:12px 22px; border-radius:18px; font-size:18px; opacity:0; transition:opacity .25s, transform .25s; z-index:99; pointer-events:none;}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
.diff-wrap{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:18px;}
.diff-btn{border:none; cursor:pointer; font-family:inherit; font-weight:900; color:#fff; border-radius:22px; padding:18px 30px; font-size:24px; box-shadow:0 6px 0 rgba(0,0,0,.2); width:min(280px,80%);}
.diff-btn:active{transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,.2);}

/* memory cards */
.mem-grid{flex:1; display:grid; gap:8px; padding:12px; place-content:center;}
.mcard{position:relative; cursor:pointer; border-radius:16px; aspect-ratio:1; min-width:54px;}
.mface{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; border-radius:16px; backface-visibility:hidden; transition:transform .35s; font-size:clamp(28px,6vw,46px); box-shadow:0 4px 0 rgba(0,0,0,.18);}
.mback{background:linear-gradient(160deg,#8a6dff,#6a4dff); color:#fff;}
.mfront{background:#fff; transform:rotateY(180deg);}
.mcard.flipped .mback{transform:rotateY(180deg);} .mcard.flipped .mfront{transform:rotateY(360deg);}
.mcard.matched .mfront{box-shadow:0 0 0 4px #3fc66b, 0 4px 0 rgba(0,0,0,.1);}
/* piano */
.piano{flex:1; display:flex; align-items:stretch; gap:6px; padding:18px 12px;}
.pkey{flex:1; border:none; cursor:pointer; border-radius:0 0 16px 16px; color:#fff; font-weight:900; font-size:clamp(14px,2.6vw,20px); display:flex; align-items:flex-end; justify-content:center; padding-bottom:14px; box-shadow:0 8px 0 rgba(0,0,0,.18); transition:transform .06s;}
.pkey:active,.pkey.down{transform:translateY(6px); box-shadow:0 2px 0 rgba(0,0,0,.18);}
/* odd one out */
.odd-grid{flex:1; display:grid; gap:6px; padding:12px; place-content:center;}
.odd-cell{cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:clamp(26px,6vw,46px); background:#f4eefc; border-radius:14px; aspect-ratio:1; min-width:48px; transition:transform .1s;}
.odd-cell:active{transform:scale(.9);}
/* bopomofo */
.bp-tabs{display:flex; gap:8px; justify-content:center; padding:8px;}
.bp-grid{flex:1; display:grid; grid-template-columns:repeat(auto-fill,minmax(72px,1fr)); gap:8px; padding:10px; overflow-y:auto; align-content:start;}
.bp-tile{cursor:pointer; background:#fff; border-radius:16px; box-shadow:0 4px 0 #d8c4f0,inset 0 0 0 3px #efe4fb; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:8px 4px; gap:2px;}
.bp-tile:active{transform:translateY(3px); box-shadow:0 1px 0 #d8c4f0,inset 0 0 0 3px #efe4fb;}
.bp-sym{font-size:clamp(30px,6vw,44px); font-weight:900; color:#7c3aed; line-height:1;}
.bp-word{font-size:13px; color:#777; font-weight:700;}
.bp-emoji{font-size:24px;}
</style>
</head>
<body>
<div id="app">
  <section id="home" class="screen active">
    <div class="clouds" aria-hidden="true">
      <div class="cloud" style="top:8%; animation-delay:0s">☁️</div>
      <div class="cloud" style="top:22%; animation-delay:-8s; font-size:46px">☁️</div>
      <div class="cloud" style="top:5%; animation-delay:-15s; font-size:80px">⛅</div>
    </div>
    <h1 class="home-title">🌈 歡樂遊戲屋 🌈</h1>
    <div class="home-top">
      <span class="starcount" id="starCount">⭐ 0</span>
      <button class="musicbtn" id="musicBtn">🎵 音樂：關</button>
      <button class="musicbtn" id="settingsBtn">⚙️ 設定</button>
    </div>
    <p class="home-sub">點一下圖案就可以開始玩囉！</p>
    <div id="grid" class="grid"></div>
    <div id="shelf" class="shelf"></div>
  </section>

  <section id="game" class="screen">
    <div class="topbar">
      <button class="tbtn home" id="homeBtn">🏠 回家</button>
      <span class="gtitle" id="gameTitle"></span>
      <span class="scorepill" id="scorePill" style="display:none"></span>
      <button class="tbtn mute" id="muteBtn">🔊</button>
    </div>
    <div id="gameStage"></div>
  </section>
</div>
<div id="toast"></div>
<script>
/* ============ helpers ============ */
const $=s=>document.querySelector(s);
const stage=()=>$("#gameStage");
function el(tag,cls,html){const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e;}
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function shuffle(a){a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a;}
function svgURL(svg){return 'url("data:image/svg+xml,'+encodeURIComponent(svg)+'")';}

/* ============ sound ============ */
const Sound=(()=>{let ctx,on=true;
  function ensure(){if(!ctx){try{ctx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}}
  function blip(freq,dur,type,vol){dur=dur||.12;type=type||'sine';vol=vol==null?.18:vol;
    if(!on)return; ensure(); if(!ctx)return;
    try{const o=ctx.createOscillator(),g=ctx.createGain(); o.type=type;o.frequency.value=freq;
      o.connect(g);g.connect(ctx.destination); const t=ctx.currentTime;
      g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(.001,t+dur);
      o.start(t);o.stop(t+dur);}catch(e){}}
  return{
    blip:blip,
    tap(){blip(520,.08,'sine',.12);},
    good(){blip(660,.1);setTimeout(()=>blip(990,.13),90);},
    bad(){blip(180,.2,'sawtooth',.13);},
    win(){[523,659,784,1046,1318].forEach((f,i)=>setTimeout(()=>blip(f,.16,'triangle',.22),i*110));},
    pop(){blip(pick([700,760,820,640]),.07,'square',.1);},
    toggle(){on=!on;return on;}, isOn:()=>on
  };
})();

/* ============ effects ============ */
function confetti(host){
  const cols=['#ff5e57','#ff9f43','#ffd54a','#3fc66b','#4d9bff','#9b6dff','#ff7eb3'];
  for(let i=0;i<46;i++){const s=el('div','confetti');
    s.style.left=Math.random()*100+'%'; s.style.background=pick(cols);
    s.style.setProperty('--x',(Math.random()*240-120)+'px');
    s.style.animationDelay=(Math.random()*.4)+'s';
    s.style.transform='rotate('+rand(0,360)+'deg)';
    host.appendChild(s); setTimeout(()=>s.remove(),2000);}
}
function celebrate(host,msg,onAgain){
  Sound.win(); confetti(host);
  if(current){ Stars.award(current.id); }
  const cheers=['太棒了！','你好厲害！','做得很好！','好棒喔！','完成囉！'];
  const ov=el('div','overlay');
  Speak.say(pick(['太棒了','你好厲害','你做到了','好棒喔']));
  ov.appendChild(el('div','star','⭐'));
  ov.appendChild(el('div','msg',msg||pick(cheers)));
  const pone=el('div','plus-one','+1 ⭐'); pone.style.left='50%'; pone.style.top='40%'; ov.appendChild(pone);
  const b=el('button','bigbtn','🔁 再玩一次');
  b.onclick=()=>{Sound.tap(); ov.remove(); onAgain&&onAgain();};
  ov.appendChild(b); host.appendChild(ov);
}

/* ============ score pill ============ */
const Score={
  show(txt){const p=$("#scorePill"); p.style.display='inline-block'; p.textContent=txt;},
  hide(){$("#scorePill").style.display='none';}
};

/* ============ stars / rewards ============ */
const Stars=(()=>{
  let total=0, done={}, trophy=false;
  try{ const s=JSON.parse(localStorage.getItem('hgw_stars')||'{}'); total=s.total||0; done=s.done||{}; trophy=!!s.trophy; }catch(e){}
  function save(){ try{ localStorage.setItem('hgw_stars',JSON.stringify({total,done,trophy})); }catch(e){} }
  function award(id){ total++; done[id]=true; save(); refresh(); }
  function allDone(){ return GAMES.length>0 && GAMES.every(g=>done[g.id]); }
  function reset(){ total=0; done={}; trophy=false; save(); refresh(); }
  function refresh(){
    const sc=$("#starCount"); if(sc) sc.textContent='⭐ '+total;
    const shelf=$("#shelf"); if(!shelf)return; shelf.innerHTML='';
    GAMES.forEach(g=>{ const d=el('div','slot'+(done[g.id]?' earned':'')); d.textContent=g.icon; shelf.appendChild(d); });
  }
  return { award, refresh, reset, allDone, total:()=>total,
    trophyShown:()=>trophy, markTrophy(){ trophy=true; save(); } };
})();

/* ============ settings ============ */
const Settings=(()=>{
  let s={childLock:false, voice:true};
  try{ s=Object.assign(s,JSON.parse(localStorage.getItem('hgw_set')||'{}')); }catch(e){}
  function save(){ try{ localStorage.setItem('hgw_set',JSON.stringify(s)); }catch(e){} }
  return { get childLock(){return s.childLock;}, set childLock(v){s.childLock=v;save();},
           get voice(){return s.voice;}, set voice(v){s.voice=v;save();} };
})();

/* ============ chinese voice (TTS) ============ */
const Speak=(()=>{
  let zhVoice=null;
  function loadVoice(){ try{ const vs=window.speechSynthesis.getVoices();
    zhVoice=vs.find(v=>/zh.?TW/i.test(v.lang))||vs.find(v=>/^zh/i.test(v.lang))||null; }catch(e){} }
  try{ if(window.speechSynthesis){ loadVoice(); window.speechSynthesis.onvoiceschanged=loadVoice; } }catch(e){}
  function say(text){
    if(!Settings.voice||!text)return;
    try{ if(!window.speechSynthesis)return;
      window.speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(String(text));
      u.lang='zh-TW'; u.rate=.92; u.pitch=1.15; if(zhVoice)u.voice=zhVoice;
      window.speechSynthesis.speak(u);
    }catch(e){}
  }
  return { say };
})();

/* ============ background music ============ */
const Music=(()=>{
  let ctx,gain,on=false,timer,step=0;
  const notes=[523,587,659,784,659,587,523,659,784,880,784,659];
  function start(){
    if(on)return; on=true;
    try{ ctx=ctx||new (window.AudioContext||window.webkitAudioContext)();
      gain=ctx.createGain(); gain.gain.value=0.06; gain.connect(ctx.destination);
      tick();
    }catch(e){ on=false; }
  }
  function tick(){
    if(!on||!ctx)return;
    try{ const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='triangle'; o.frequency.value=notes[step%notes.length];
      g.gain.value=0; o.connect(g); g.connect(gain);
      const t=ctx.currentTime; g.gain.linearRampToValueAtTime(.5,t+.05); g.gain.linearRampToValueAtTime(0,t+.45);
      o.start(t); o.stop(t+.5);
    }catch(e){}
    step++; timer=setTimeout(tick,420);
  }
  function stop(){ on=false; clearTimeout(timer); }
  function toggle(){ if(on){stop();return false;} start(); return true; }
  return { toggle, isOn:()=>on };
})();

/* ============ misc UI helpers ============ */
let toastT=null;
function toast(msg){
  const t=$("#toast"); if(!t)return; t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1800);
}

function bindShell(){
  setupHomeButton();

  $("#musicBtn").onclick=function(){const on=Music.toggle(); this.textContent=on?'🎵 音樂：開':'🎵 音樂：關';};

function setupHomeButton(){
  const btn=$("#homeBtn");
  const ring=el('span','lockring'); btn.appendChild(ring);
  let holdT=null, held=false;
  function start(){
    if(!Settings.childLock)return;
    ring.style.transition='width .9s linear'; ring.style.width='100%';
    holdT=setTimeout(()=>{ held=true; ring.style.transition='none'; ring.style.width='0'; goHome(); },900);
  }
  function cancel(){
    if(holdT){clearTimeout(holdT);holdT=null;}
    ring.style.transition='width .2s'; ring.style.width='0';
  }
  btn.addEventListener('pointerdown',start);
  btn.addEventListener('pointerup',cancel);
  btn.addEventListener('pointerleave',cancel);
  btn.addEventListener('pointercancel',cancel);
  btn.addEventListener('click',()=>{
    if(held){ held=false; return; }
    if(Settings.childLock){ btn.classList.add('shake'); setTimeout(()=>btn.classList.remove('shake'),350); toast('按住「回家」2秒才能離開喔'); }
    else goHome();
  });
}

        slot.dataset.idx=r*N+c; slot.dataset.filled='0';
        slot.onclick=()=>{
          if(!selected||slot.dataset.filled==='1')return;
          if(+selected.dataset.idx===+slot.dataset.idx){
            Sound.good();
            slot.style.backgroundImage=url; slot.style.backgroundSize=(N*100)+'% '+(N*100)+'%';
            slot.style.backgroundPosition=(c/(N-1||1)*100)+'% '+(r/(N-1||1)*100)+'%';
            slot.style.border='none'; slot.dataset.filled='1'; slot.textContent='';
            selected.remove(); selected=null; placedCount++;
            if(placedCount===N*N) setTimeout(()=>celebrate(card,'拼好了！好棒！',deal),400);
          }else{Sound.bad(); slot.classList.add('shake'); setTimeout(()=>slot.classList.remove('shake'),350);}
        };
        board.appendChild(slot); slots.push(slot);
      }
      // pieces
      const pieces=[];
      for(let r=0;r<N;r++)for(let c=0;c<N;c++){
        const p=el('div'); p.dataset.idx=r*N+c;
        p.style.cssText='width:'+px+'px;height:'+px+'px;border-radius:6px;cursor:pointer;background-image:'+url+';background-size:'+(N*100)+'% '+(N*100)+'%;background-position:'+(c/(N-1||1)*100)+'% '+(r/(N-1||1)*100)+'%;box-shadow:0 3px 6px rgba(0,0,0,.2);border:2px solid #fff;';
        p.onclick=()=>{Sound.tap(); selected=p; [...tray.children].forEach(x=>x.style.outline='none'); p.style.outline='4px solid #ffd54a';};
        pieces.push(p);
      }
      shuffle(pieces).forEach(p=>tray.appendChild(p));
    }
    wrap.appendChild(opts); wrap.appendChild(area); card.appendChild(wrap);
    deal();
    card.appendChild(el('div','hint','點一塊拼圖，再點對的格子！'));
  }
});

          },450);
        }else{
          const a=first;
          setTimeout(()=>{a.classList.remove('flipped'); c.classList.remove('flipped'); first=null; lock=false;},800);
        }
      };
      grid.appendChild(c);
    });
    const wrap=el('div'); wrap.style.cssText='position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;';

/* ===================== GAME 12: 釣魚 ===================== */
GAMES.push({
  id:'fishing', title:'釣魚', icon:'🎣', color:'#3fc6e6', color2:'#1aa3c4',
  say:'點水裡的魚，把牠們釣起來！',
  start(st){
    const card=makeCard(st);
    card.style.background='linear-gradient(180deg,#a7e9ff,#3fb6e6 85%)';
    const fishes=['🐠','🐟','🐡','🦈','🐙','🦀','🦑','🐢'];
    let caught=0, goal=10, alive=true; const timers=[];
    const self=this;
    Score.show('釣到 0/'+goal);
    const wrap=el('div'); wrap.style.cssText='position:absolute;inset:0;overflow:hidden;';
    card.appendChild(wrap);
    function spawn(){
      if(!alive)return;
      const f=el('button'); f.textContent=pick(fishes);
      const fromLeft=Math.random()<.5; const y=rand(8,82);
      f.style.cssText='position:absolute;border:none;background:none;cursor:pointer;font-size:clamp(38px,8vw,64px);top:'+y+'%;'+(fromLeft?'left:-15%;':'right:-15%;')+'filter:drop-shadow(0 3px 4px rgba(0,0,0,.2));';
      if(!fromLeft)f.style.transform='scaleX(-1)';
      wrap.appendChild(f);
      const dur=rand(4500,7500);
      try{ if(f.animate){ const a=f.animate(
          [{transform:(fromLeft?'translateX(0)':'scaleX(-1) translateX(0)')},{transform:(fromLeft?'translateX(135vw)':'scaleX(-1) translateX(135vw)')}],
          {duration:dur,easing:'linear'}); a.onfinish=()=>f.remove(); } }catch(e){}
      f.onclick=()=>{ if(f.dataset.c)return; f.dataset.c='1';
        Sound.good(); caught++; Score.show('釣到 '+caught+'/'+goal);
        f.textContent='✨'; setTimeout(()=>f.remove(),200);
        if(caught>=goal){ alive=false; timers.forEach(clearTimeout); celebrate(card,'釣到好多魚！',()=>self.start(st)); }
      };
      timers.push(setTimeout(spawn, rand(650,1300)));
    }
    for(let i=0;i<3;i++) timers.push(setTimeout(spawn, i*450));
    this._cleanup=()=>{ alive=false; timers.forEach(clearTimeout); };
    card.appendChild(el('div','hint','點游過去的魚就能釣到牠！'));
  },
  stop(){ if(this._cleanup)this._cleanup(); }
});
